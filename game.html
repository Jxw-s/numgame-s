<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略阶梯 · 心跳惩罚</title>
    <style>
        * { box-sizing: border-box; }
        body { text-align: center; font-family: 'Segoe UI', Arial; background: #0b0e14; color: #eee; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .game-container { max-width: 500px; width: 100%; background: #1a1f2b; padding: 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #2e3748; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: #0f131c; padding: 10px 20px; border-radius: 60px; margin-bottom: 20px; font-size: 18px; transition: background 0.1s; }
        .status-bar.flash { background: #2c3548; }
        .hearts { color: #ff4757; font-size: 24px; letter-spacing: 2px; transition: 0.1s; }
        .heart-shake { animation: shake 0.3s ease-in-out; color: #ff0000; }
        @keyframes shake { 0%,100%{transform:scale(1);} 50%{transform:scale(1.5);} }
        .turn { background: #3742fa; padding: 2px 15px; border-radius: 20px; font-size: 14px; }
        .combo-indicator { background: #f1c40f; color: #1a1f2b; padding: 2px 12px; border-radius: 30px; font-weight: 800; font-size: 14px; display: inline-block; }
        .fighter-area { display: flex; justify-content: space-between; align-items: center; background: #11161f; padding: 20px 15px; border-radius: 30px; margin-bottom: 20px; border: 1px solid #2c3545; }
        .fighter { text-align: center; }
        .fighter .emoji { font-size: 36px; display: block; }
        .fighter .label { font-size: 12px; color: #8892a8; margin: 5px 0; }
        .fighter .value { font-size: 38px; font-weight: 800; background: #0b0e14; padding: 0 15px; border-radius: 15px; min-width: 60px; display: inline-block; }
        .vs-badge { font-size: 24px; color: #ff6b81; font-weight: 900; text-shadow: 0 0 10px #ff6b8144; }
        .player-value { color: #2ed573; }
        .boss-value { color: #ffa502; }
        .hand-area { display: flex; gap: 12px; margin: 25px 0; justify-content: center; }
        .card { flex: 1; background: #232b3b; padding: 15px 0; border-radius: 20px; border: 2px solid #3d475c; cursor: pointer; transition: all 0.15s ease; box-shadow: 0 4px 0 #0b0e14; font-weight: bold; text-align: center; }
        .card:hover { transform: translateY(-6px); border-color: #f1c40f; background: #2c3548; }
        .card:active { transform: translateY(2px); box-shadow: 0 1px 0 #0b0e14; }
        .card .op-symbol { font-size: 28px; display: block; }
        .card .op-value { font-size: 26px; background: #0f131c; padding: 2px 10px; border-radius: 30px; display: inline-block; margin-top: 5px; color: #f1c40f; }
        .card-add .op-symbol { color: #2ed573; }
        .card-mul .op-symbol { color: #8c7ae6; }
        .card-sub .op-symbol { color: #ff6b81; }
        .disabled-card { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .log-box { background: #0f131c; padding: 12px; border-radius: 20px; font-size: 15px; margin: 15px 0; min-height: 50px; color: #bdc3d7; border-left: 4px solid #3742fa; text-align: left; word-break: break-all; }
        .btn-challenge { width: 100%; padding: 16px; font-size: 22px; font-weight: bold; background: #e67e22; border: none; border-radius: 60px; color: white; cursor: pointer; box-shadow: 0 6px 0 #b85e1a; transition: 0.1s ease; margin-top: 5px; }
        .btn-challenge:active { transform: translateY(4px); box-shadow: 0 2px 0 #b85e1a; }
        .btn-reset { width: 100%; padding: 12px; font-size: 16px; background: #3d475c; border: none; border-radius: 60px; color: #ddd; cursor: pointer; margin-top: 12px; }
        .btn-reset:active { opacity: 0.7; }
        .result-msg { font-size: 20px; font-weight: bold; margin: 15px 0 5px 0; min-height: 30px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="status-bar" id="statusBar">
        <span class="hearts" id="heartDisplay">❤️❤️❤️</span>
        <span class="turn" id="turnDisplay">回合 1</span>
        <span id="comboDisplay"></span>
    </div>

    <div class="fighter-area">
        <div class="fighter">
            <span class="emoji">🧙</span>
            <div class="label">你的数字</div>
            <div class="value player-value" id="playerNum">1</div>
        </div>
        <div class="vs-badge">⚡</div>
        <div class="fighter">
            <span class="emoji">👹</span>
            <div class="label">守关者</div>
            <div class="value boss-value" id="bossNum">30</div>
        </div>
    </div>

    <div class="hand-area" id="cardContainer"></div>

    <div class="log-box" id="logMsg">🃏 选择一张卡牌来运算...</div>
    
    <button class="btn-challenge" id="challengeBtn" onclick="challengeBoss()">⚔️ 挑战守关者</button>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn-reset" onclick="resetGame()">🔄 重开一局</button>
</div>

<script>
    // ---------- 游戏数据 ----------
    let player = 1;
    let boss = 30;
    let hearts = 3;
    let turn = 0;
    let lastOp = '';
    let comboCount = 0;
    let gameOver = false;

    const playerEl = document.getElementById('playerNum');
    const bossEl = document.getElementById('bossNum');
    const heartEl = document.getElementById('heartDisplay');
    const turnEl = document.getElementById('turnDisplay');
    const logEl = document.getElementById('logMsg');
    const resultEl = document.getElementById('resultMsg');
    const comboEl = document.getElementById('comboDisplay');
    const statusBar = document.getElementById('statusBar');
    const cardContainer = document.getElementById('cardContainer');

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function flashStatus() {
        statusBar.classList.add('flash');
        setTimeout(() => statusBar.classList.remove('flash'), 150);
    }

    // 红心抖动特效
    function shakeHeart() {
        heartEl.classList.remove('heart-shake');
        void heartEl.offsetWidth;
        heartEl.classList.add('heart-shake');
    }

    function updateUI() {
        playerEl.innerText = player;
        bossEl.innerText = boss;
        let heartStr = '';
        for (let i = 0; i < 3; i++) {
            heartStr += (i < hearts) ? '❤️' : '🖤';
        }
        heartEl.innerText = heartStr;
        turnEl.innerText = `回合 ${turn}`;
        if (comboCount >= 2) {
            comboEl.innerHTML = `<span class="combo-indicator">⚡ ${comboCount}连击</span>`;
        } else {
            comboEl.innerHTML = '';
        }
    }

    function generateCards() {
        let addVal = rand(2, 10);
        let mulVal = rand(2, 4);
        let subVal = rand(1, 8);
        let cards = [
            { op: 'add', val: addVal, symbol: '+', label: '加法' },
            { op: 'mul', val: mulVal, symbol: '×', label: '乘法' },
            { op: 'sub', val: subVal, symbol: '−', label: '减法' }
        ];
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        return cards;
    }

    function renderCards(cards) {
        cardContainer.innerHTML = '';
        cards.forEach(card => {
            const div = document.createElement('div');
            div.className = `card card-${card.op}`;
            let warnIcon = (card.op === 'sub' && card.val >= 5) ? '⚠️' : '';
            div.innerHTML = `
                <span class="op-symbol">${card.symbol}</span>
                <span class="op-value">${card.val}</span>
                <div style="font-size:12px;color:#8892a8;margin-top:4px;">${warnIcon} ${card.label}</div>
            `;
            div.addEventListener('click', () => {
                if (gameOver) {
                    logEl.innerText = '⛔ 游戏已结束，请点击"重开一局"';
                    return;
                }
                playCard(card.op, card.val);
            });
            cardContainer.appendChild(div);
        });
    }

    // ----- 核心：扣血函数（带特效） -----
    function loseHeart() {
        hearts--;
        if (hearts < 0) hearts = 0;
        shakeHeart();
        updateUI();
        if (hearts === 0) {
            gameOver = true;
            logEl.innerText = '💀 心已碎... 点击"重开一局"';
            resultEl.innerText = '💀 游戏结束';
            resultEl.style.color = '#ff4757';
            document.querySelectorAll('.card').forEach(c => c.classList.add('disabled-card'));
        }
    }

    // ----- 打出卡牌 -----
    function playCard(op, val) {
        if (gameOver) return;

        let oldPlayer = player;
        let logText = '';
        let comboBonus = 1;

        if (lastOp === op) {
            comboCount++;
            if (comboCount >= 2) {
                comboBonus = 1.5;
                logText += `🔥 ${comboCount}连击！`;
            }
        } else {
            comboCount = 0;
        }
        lastOp = op;

        let actualVal = Math.round(val * comboBonus);
        switch(op) {
            case 'add': player = player + actualVal; logText += ` ${oldPlayer} + ${actualVal} = ${player}`; break;
            case 'mul': player = player * actualVal; logText += ` ${oldPlayer} × ${actualVal} = ${player}`; break;
            case 'sub': player = player - actualVal; logText += ` ${oldPlayer} − ${actualVal} = ${player}`; break;
        }

        // 边界保护 & 扣血条件1：归零
        let isLostHeart = false;
        if (player < 1) {
            player = 1;
            loseHeart(); // 扣一颗心
            isLostHeart = true;
            logText += ` 💔归零扣血`;
        }
        if (player > 99999) player = 99999;

        // BOSS成长
        let bossGrow = rand(1, 5);
        boss += bossGrow;
        turn++;

        updateUI();
        flashStatus();

        // 日志显示
        if (isLostHeart) {
            logEl.innerText = `🎴 你使用了 ${op==='add'?'加法':op==='mul'?'乘法':'减法'} | ${logText} | 👹 BOSS 提升了 ${bossGrow} (剩余 ${hearts} 心)`;
        } else {
            logEl.innerText = `🎴 你使用了 ${op==='add'?'加法':op==='mul'?'乘法':'减法'} | ${logText} | 👹 BOSS 提升了 ${bossGrow}`;
        }
        resultEl.innerText = '';

        // 刷新下一轮手牌
        if (!gameOver) {
            let newCards = generateCards();
            renderCards(newCards);
        }
    }

    // ----- 挑战BOSS（扣血条件2：挑战失败） -----
    function challengeBoss() {
        if (gameOver) {
            alert('游戏已结束，请重开！');
            return;
        }

        turn++; // 挑战也算一次行动

        if (player > boss) {
            // 胜利
            resultEl.style.color = '#2ed573';
            resultEl.innerText = `🎉 胜利！ ${player} > ${boss} ！进入下一关！`;
            // 奖励：恢复一颗心（上限3）
            if (hearts < 3) {
                hearts++;
                updateUI();
                logEl.innerText = `✨ 奖励！恢复1颗心！ (当前 ${hearts} 心)`;
            } else {
                logEl.innerText = `✨ 完美胜利！心已满！`;
            }
            // 重置关卡
            player = 1;
            boss = rand(20, 60);
            turn = 0;
            lastOp = '';
            comboCount = 0;
            gameOver = false;
            updateUI();
            flashStatus();
            // 刷新手牌
            let newCards = generateCards();
            renderCards(newCards);
            document.querySelectorAll('.card').forEach(c => c.classList.remove('disabled-card'));
        } else {
            // 【重点】失败惩罚：扣血！
            resultEl.style.color = '#ff6b81';
            resultEl.innerText = `💀 挑战失败！ ${player} < ${boss} ，失去一颗心！`;
            
            // 扣血
            loseHeart();
            // BOSS额外增长
            boss += 5;
            updateUI();
            flashStatus();
            logEl.innerText = `😤 BOSS 反击！额外增长了 5 点 (当前 ${boss})，剩余 ${hearts} 心`;

            // 如果扣血后游戏结束，禁用卡片
            if (gameOver) {
                document.querySelectorAll('.card').forEach(c => c.classList.add('disabled-card'));
            }
        }
    }

    function resetGame() {
        player = 1;
        boss = rand(20, 60);
        hearts = 3;
        turn = 0;
        lastOp = '';
        comboCount = 0;
        gameOver = false;
        resultEl.style.color = '#eee';
        resultEl.innerText = '🔄 新的一局，加油！';
        updateUI();
        logEl.innerText = '🃏 选择一张卡牌开始...';
        let newCards = generateCards();
        renderCards(newCards);
        document.querySelectorAll('.card').forEach(c => c.classList.remove('disabled-card'));
        flashStatus();
    }

    resetGame();
</script>
</body>
</html>
